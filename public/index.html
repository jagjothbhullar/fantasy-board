<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Big Board 2026 — Live FA Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --gold: #f59e0b;
      --purple: #a855f7;
      --cyan: #06b6d4;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 30px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header h1 span {
      font-size: 14px;
      font-weight: 500;
      -webkit-text-fill-color: var(--text-dim);
      margin-left: 10px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
    }

    .countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      margin-left: 12px;
    }

    /* NEWS TICKER */
    .ticker-wrap {
      overflow: hidden;
      background: rgba(59, 130, 246, 0.08);
      border-radius: 6px;
      padding: 8px 0;
      border: 1px solid rgba(59, 130, 246, 0.15);
    }

    .ticker {
      display: flex;
      animation: scroll 60s linear infinite;
      white-space: nowrap;
    }

    .ticker:hover { animation-play-state: paused; }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 30px;
      font-size: 13px;
      font-weight: 500;
    }

    .ticker-item .move-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .tag-signed { background: rgba(34, 197, 94, 0.2); color: var(--green); }
    .tag-trade { background: rgba(168, 85, 247, 0.2); color: var(--purple); }
    .tag-released { background: rgba(239, 68, 68, 0.2); color: var(--red); }
    .tag-tagged { background: rgba(245, 158, 11, 0.2); color: var(--gold); }

    /* CONTROLS */
    .controls {
      display: flex;
      gap: 8px;
      padding: 15px 30px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    .search-box {
      margin-left: auto;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      width: 220px;
      font-family: inherit;
    }

    .search-box::placeholder { color: var(--text-dim); }
    .search-box:focus { outline: none; border-color: var(--accent); }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-right: 20px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .stats-bar .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stats-bar .stat .num { font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 0;
      min-height: calc(100vh - 140px);
    }

    /* BOARD TABLE */
    .board-section {
      padding: 0;
      overflow-y: auto;
      max-height: calc(100vh - 140px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    thead th {
      background: var(--surface2);
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      border-bottom: 2px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid rgba(30, 41, 59, 0.5);
      transition: background 0.15s;
    }

    tbody tr:hover { background: rgba(59, 130, 246, 0.05); }
    tbody tr.trending-up { background: rgba(34, 197, 94, 0.04); }
    tbody tr.trending-down { background: rgba(239, 68, 68, 0.04); }

    td {
      padding: 10px 14px;
      font-size: 13px;
      vertical-align: middle;
    }

    .rank-cell {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      width: 50px;
      text-align: center;
    }

    .rank-1 { color: var(--gold); font-size: 16px; }
    .rank-top10 { color: var(--accent); }
    .rank-top25 { color: var(--cyan); }

    .trend-cell {
      width: 60px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
    }

    .trend-up { color: var(--green); }
    .trend-down { color: var(--red); }
    .trend-neutral { color: var(--text-dim); }

    .player-cell {
      font-weight: 600;
      min-width: 180px;
    }

    .player-cell .rookie-badge {
      font-size: 9px;
      background: linear-gradient(135deg, var(--gold), #d97706);
      color: #000;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 800;
      margin-left: 6px;
      vertical-align: middle;
    }

    .pos-cell {
      width: 50px;
    }

    .pos-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
    }

    .pos-QB { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .pos-RB { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .pos-WR { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .pos-TE { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
    .pos-EDGE, .pos-DB { background: rgba(168, 85, 247, 0.15); color: #c084fc; }

    .team-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      width: 70px;
    }

    .team-fa { color: var(--gold); font-style: italic; }
    .team-rookie { color: var(--gold); }

    .note-cell {
      font-size: 12px;
      color: var(--text-dim);
      max-width: 350px;
    }

    .note-cell .hot { color: var(--green); font-weight: 600; }

    /* TIER DIVIDERS */
    .tier-row td {
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.1), transparent);
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      border-bottom: 1px solid rgba(59, 130, 246, 0.2);
    }

    /* SIDEBAR - MOVES FEED */
    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      max-height: calc(100vh - 140px);
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
    }

    .move-card {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(30, 41, 59, 0.5);
      transition: background 0.15s;
    }

    .move-card:hover { background: rgba(59, 130, 246, 0.05); }

    .move-card .move-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .move-card .player-name {
      font-weight: 700;
      font-size: 14px;
    }

    .move-card .move-time {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .move-card .move-detail {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .move-card .move-route {
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .move-card .arrow { color: var(--accent); }
    .move-card .impact {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      font-style: italic;
    }

    .move-card .impact-up { border-left: 2px solid var(--green); padding-left: 8px; }
    .move-card .impact-down { border-left: 2px solid var(--red); padding-left: 8px; }
    .move-card .impact-neutral { border-left: 2px solid var(--text-dim); padding-left: 8px; }

    /* NEWS ITEMS */
    .news-item {
      padding: 10px 20px;
      border-bottom: 1px solid rgba(30, 41, 59, 0.5);
      font-size: 12px;
    }

    .news-item .news-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .news-item .news-title a {
      color: var(--text);
      text-decoration: none;
    }

    .news-item .news-title a:hover { color: var(--accent); }

    .news-item .news-meta {
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
    }

    .news-item .news-source {
      color: var(--cyan);
      font-weight: 700;
    }


    /* FLASH ANIMATION */
    @keyframes flash-green {
      0% { background: rgba(34, 197, 94, 0.2); }
      100% { background: transparent; }
    }

    @keyframes flash-red {
      0% { background: rgba(239, 68, 68, 0.2); }
      100% { background: transparent; }
    }

    .flash-up { animation: flash-green 2s ease-out; }
    .flash-down { animation: flash-red 2s ease-out; }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { max-height: 400px; border-left: none; border-top: 1px solid var(--border); }
      .note-cell { display: none; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <h1>FANTASY BIG BOARD <span>2026-2027 Season — Top 150</span></h1>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE — FREE AGENCY TRACKER
        <span class="countdown" id="countdown">30s</span>
      </div>
    </div>
    <div class="ticker-wrap">
      <div class="ticker" id="ticker"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="filter-btn active" onclick="setFilter('ALL', this)">All</button>
    <button class="filter-btn" onclick="setFilter('QB', this)">QB</button>
    <button class="filter-btn" onclick="setFilter('RB', this)">RB</button>
    <button class="filter-btn" onclick="setFilter('WR', this)">WR</button>
    <button class="filter-btn" onclick="setFilter('TE', this)">TE</button>
    <button class="filter-btn" onclick="setFilter('ROOKIE', this)">Rookies</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px;"></span>
    <button class="filter-btn" onclick="setFilter('MOVED', this)">Moves (<span id="stat-moves">0</span>)</button>
    <button class="filter-btn" onclick="setFilter('UP', this)" style="border-color:rgba(34,197,94,0.3);">▲ Up (<span id="stat-up">0</span>)</button>
    <button class="filter-btn" onclick="setFilter('DOWN', this)" style="border-color:rgba(239,68,68,0.3);">▼ Down (<span id="stat-down">0</span>)</button>
    <span style="width:1px;height:20px;background:var(--border);margin:0 4px;"></span>
    <input type="text" class="search-box" id="search" placeholder="Search player, team...">
    <select class="search-box" id="team-filter" onchange="setTeamFilter(this.value)" style="width:120px;">
      <option value="">All Teams</option>
    </select>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="board-section">
      <table>
        <thead>
          <tr>
            <th>RK</th>
            <th>TREND</th>
            <th>PLAYER</th>
            <th>POS</th>
            <th>TEAM</th>
            <th>SITUATION</th>
          </tr>
        </thead>
        <tbody id="board-body"></tbody>
      </table>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">
        LIVE NEWS
        <span style="display:flex;align-items:center;gap:8px;">
          <span id="claude-status" style="font-size:9px;font-weight:400;color:var(--text-dim);display:flex;align-items:center;gap:4px;">
            <span style="width:6px;height:6px;background:var(--purple);border-radius:50%;display:inline-block;"></span>
            AI auto-updating
          </span>
          <span id="news-count" style="color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-size: 12px;"></span>
        </span>
      </div>
      <div id="news-feed"></div>
      <div class="sidebar-header" style="border-top: 2px solid var(--accent);">
        TRANSACTIONS
        <span id="move-count" style="color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 12px;"></span>
      </div>
      <div id="moves-feed"></div>
    </div>
  </div>

  <script>
    // ============================================================
    // STATE
    // ============================================================
    let boardData = [];
    let movesData = [];
    let newsData = [];
    let activeFilter = 'ALL';
    let searchQuery = '';
    let countdown = 600;

    const tiers = [
      { after: 0, label: 'TIER 1 — ELITE (ROUND 1 PICKS)' },
      { after: 12, label: 'TIER 2 — FIRST ROUND LOCKS' },
      { after: 24, label: 'TIER 3 — EARLY-MID ROUND VALUE' },
      { after: 48, label: 'TIER 4 — MID ROUND TARGETS' },
      { after: 72, label: 'TIER 5 — LATE-MID ROUND' },
      { after: 100, label: 'TIER 6 — LATE ROUND FLIERS' },
      { after: 130, label: 'TIER 7 — DEEP SLEEPERS & STASHES' },
    ];

    // ============================================================
    // FETCH DATA
    // ============================================================
    async function fetchBoard() {
      try {
        const [boardRes, movesRes] = await Promise.all([
          fetch('/api/board'),
          fetch('/api/moves')
        ]);
        const boardJson = await boardRes.json();
        const movesJson = await movesRes.json();

        boardData = boardJson.board;
        movesData = movesJson.moves;
        newsData = movesJson.news || [];

        // Update Claude status indicator
        const claudeEl = document.getElementById('claude-status');
        if (boardJson.lastClaudeRun) {
          const ago = Math.round((Date.now() - new Date(boardJson.lastClaudeRun).getTime()) / 60000);
          claudeEl.innerHTML = `<span style="width:6px;height:6px;background:${ago < 12 ? 'var(--green)' : 'var(--gold)'};border-radius:50%;display:inline-block;"></span> AI updated ${ago}m ago`;
        }

        populateTeamDropdown();
        renderBoard();
        renderMoves();
        renderNews();
        renderTicker();
        updateStats();
      } catch (err) {
        console.error('Fetch error:', err);
      }
    }

    // ============================================================
    // RENDER BOARD
    // ============================================================
    function renderBoard() {
      const tbody = document.getElementById('board-body');
      let filtered = [...boardData];

      // Build set of moved player names for the MOVED filter
      const movedNames = new Set(movesData.map(m => m.player.toLowerCase()));

      // Apply position/status filters
      if (activeFilter === 'ROOKIE') {
        filtered = filtered.filter(p => p.team === 'ROOKIE');
      } else if (activeFilter === 'TRENDING') {
        filtered = filtered.filter(p => p.trend === 'up' || p.trend === 'down');
      } else if (activeFilter === 'UP') {
        filtered = filtered.filter(p => p.trend === 'up');
      } else if (activeFilter === 'DOWN') {
        filtered = filtered.filter(p => p.trend === 'down');
      } else if (activeFilter === 'MOVED') {
        filtered = filtered.filter(p => movedNames.has(p.name.toLowerCase()));
      } else if (activeFilter !== 'ALL') {
        filtered = filtered.filter(p => p.pos === activeFilter);
      }

      // Apply team filter (stacks with other filters)
      if (teamFilter) {
        filtered = filtered.filter(p => p.team === teamFilter);
      }

      // Apply search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.team.toLowerCase().includes(q) ||
          p.pos.toLowerCase().includes(q) ||
          (p.note && p.note.toLowerCase().includes(q))
        );
      }

      let html = '';
      let tierIdx = 0;

      filtered.forEach((p, i) => {
        // Insert tier dividers
        while (tierIdx < tiers.length && p.rank > tiers[tierIdx].after) {
          if (activeFilter === 'ALL' && !searchQuery) {
            html += `<tr class="tier-row"><td colspan="6">${tiers[tierIdx].label}</td></tr>`;
          }
          tierIdx++;
        }

        const rankClass = p.rank === 1 ? 'rank-1' : p.rank <= 10 ? 'rank-top10' : p.rank <= 25 ? 'rank-top25' : '';
        const trendClass = p.trend === 'up' ? 'trending-up' : p.trend === 'down' ? 'trending-down' : '';

        let trendHtml = '<span class="trend-neutral">—</span>';
        if (p.trend === 'up') {
          trendHtml = `<span class="trend-up">▲ ${p.trendAmt || ''}</span>`;
        } else if (p.trend === 'down') {
          trendHtml = `<span class="trend-down">▼ ${p.trendAmt || ''}</span>`;
        }

        const isRookie = p.team === 'ROOKIE';
        const rookieBadge = isRookie ? '<span class="rookie-badge">ROOKIE</span>' : '';
        const teamClass = p.team === 'FA' ? 'team-fa' : isRookie ? 'team-rookie' : '';

        // Highlight hot notes
        let note = p.note || '';
        if (note.includes('🔥')) {
          note = `<span class="hot">${note}</span>`;
        }

        html += `
          <tr class="${trendClass}" id="row-${p.rank}">
            <td class="rank-cell ${rankClass}">${p.rank}</td>
            <td class="trend-cell">${trendHtml}</td>
            <td class="player-cell">${p.name}${rookieBadge}</td>
            <td class="pos-cell"><span class="pos-badge pos-${p.pos}">${p.pos}</span></td>
            <td class="team-cell ${teamClass}">${isRookie ? 'TBD' : p.team}</td>
            <td class="note-cell">${note}</td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    // ============================================================
    // RENDER MOVES FEED
    // ============================================================
    function renderMoves() {
      const feed = document.getElementById('moves-feed');
      document.getElementById('move-count').textContent = `${movesData.length} moves`;

      let html = '';
      movesData.forEach(m => {
        const impactClass = m.fantasyChange === 'up' ? 'impact-up' : m.fantasyChange === 'down' ? 'impact-down' : 'impact-neutral';
        const time = new Date(m.time).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        let tag = '';
        if (m.deal && m.deal.toLowerCase().includes('trade')) {
          tag = '<span class="move-tag tag-trade">TRADE</span>';
        } else if (m.deal && m.deal.toLowerCase().includes('release')) {
          tag = '<span class="move-tag tag-released">RELEASED</span>';
        } else if (m.deal && m.deal.toLowerCase().includes('tag')) {
          tag = '<span class="move-tag tag-tagged">TAGGED</span>';
        } else {
          tag = '<span class="move-tag tag-signed">SIGNED</span>';
        }

        const autoBadge = m.auto ? '<span style="font-size:9px;background:rgba(168,85,247,0.2);color:#c084fc;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:6px;">AI</span>' : '';

        html += `
          <div class="move-card">
            <div class="move-header">
              <span class="player-name">${m.player}${autoBadge}</span>
              <span class="move-time">${time}</span>
            </div>
            <div class="move-route">
              ${tag}
              ${m.from} <span class="arrow">→</span> ${m.to}
              ${m.deal ? `<span style="color:var(--text-dim);font-size:11px">(${m.deal})</span>` : ''}
            </div>
            <div class="impact ${impactClass}">${m.impact}</div>
          </div>
        `;
      });

      feed.innerHTML = html;
    }

    // ============================================================
    // RENDER TICKER
    // ============================================================
    let lastTickerContent = '';
    function renderTicker() {
      const ticker = document.getElementById('ticker');

      // Combine moves + live news headlines into one ticker
      const moveItems = movesData.slice(0, 15).map(m => {
        let tag = 'tag-signed';
        let label = 'SIGNED';
        if (m.deal?.toLowerCase().includes('trade')) { tag = 'tag-trade'; label = 'TRADE'; }
        else if (m.deal?.toLowerCase().includes('release')) { tag = 'tag-released'; label = 'CUT'; }
        const ai = m.auto ? ' 🤖' : '';
        return `<span class="ticker-item"><span class="move-tag ${tag}">${label}</span> ${m.player} → ${m.to} ${m.deal ? `(${m.deal})` : ''}${ai}</span>`;
      }).join('');

      const newsTickerItems = newsData.slice(0, 10).map(n =>
        `<span class="ticker-item" style="color:var(--text-dim);"><span class="move-tag" style="background:rgba(6,182,212,0.2);color:var(--cyan);">NEWS</span> ${n.title}</span>`
      ).join('');

      const combined = moveItems + newsTickerItems;

      // Only update DOM if content changed (preserves scroll animation)
      if (combined !== lastTickerContent) {
        lastTickerContent = combined;
        // Reset animation by cloning
        ticker.style.animation = 'none';
        ticker.innerHTML = combined + combined;
        // Force reflow then restart
        ticker.offsetHeight;
        ticker.style.animation = '';
      }
    }

    // ============================================================
    // RENDER NEWS FEED
    // ============================================================
    function renderNews() {
      const feed = document.getElementById('news-feed');
      const countEl = document.getElementById('news-count');
      countEl.textContent = newsData.length > 0 ? `${newsData.length} headlines` : 'polling...';

      if (newsData.length === 0) {
        feed.innerHTML = '<div class="news-item" style="color:var(--text-dim);text-align:center;padding:20px;">Polling ESPN, CBS, FOX for breaking news every 30s...</div>';
        return;
      }

      let html = '';
      newsData.forEach(n => {
        const time = new Date(n.time).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        html += `
          <div class="news-item">
            <div class="news-title">${n.link ? `<a href="${n.link}" target="_blank">${n.title}</a>` : n.title}</div>
            <div class="news-meta">
              <span class="news-source">${n.source || 'NFL'}</span>
              <span>${time}</span>
            </div>
          </div>
        `;
      });
      feed.innerHTML = html;
    }

    // ============================================================
    // UPDATE STATS
    // ============================================================
    function updateStats() {
      const movedNames = new Set(movesData.map(m => m.player.toLowerCase()));
      const movedCount = boardData.filter(p => movedNames.has(p.name.toLowerCase())).length;
      document.getElementById('stat-moves').textContent = movedCount;
      document.getElementById('stat-up').textContent = boardData.filter(p => p.trend === 'up').length;
      document.getElementById('stat-down').textContent = boardData.filter(p => p.trend === 'down').length;
    }


    // ============================================================
    // FILTERS
    // ============================================================
    let teamFilter = '';

    function setFilter(filter, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = filter;
      // Reset team dropdown when using other filters
      if (filter !== 'TEAM') {
        document.getElementById('team-filter').value = '';
        teamFilter = '';
      }
      renderBoard();
    }

    function setTeamFilter(team) {
      teamFilter = team;
      if (team) {
        // Clear other active filters
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        activeFilter = 'ALL';
      }
      renderBoard();
    }

    function populateTeamDropdown() {
      const teams = [...new Set(boardData.map(p => p.team).filter(t => t && t !== 'ROOKIE' && t !== 'FA'))].sort();
      const select = document.getElementById('team-filter');
      const current = select.value;
      select.innerHTML = '<option value="">All Teams</option>' +
        teams.map(t => `<option value="${t}" ${t === current ? 'selected' : ''}>${t}</option>`).join('');
    }

    document.getElementById('search').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderBoard();
    });

    // ============================================================
    // AUTO-REFRESH EVERY 10 MINUTES (matches Claude cycle)
    // ============================================================
    function startCountdown() {
      countdown = 600;
      const el = document.getElementById('countdown');

      setInterval(() => {
        countdown--;
        const mins = Math.floor(countdown / 60);
        const secs = countdown % 60;
        el.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

        if (countdown <= 0) {
          countdown = 600;
          fetchBoard();
        }
      }, 1000);
    }

    // ============================================================
    // INIT
    // ============================================================
    fetchBoard();
    startCountdown();
  </script>
</body>
</html>
